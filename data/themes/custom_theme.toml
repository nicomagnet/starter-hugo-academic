# Custom Theme Override
# Spotlight-inspired modern design

# Custom Colors
[color_menu]
  # Primary
  primary = "#18181b"
  primary_light = "#27272a"
  primary_dark = "#09090b"
  
  # Accent
  accent = "#4f46e5"
  accent_light = "#6366f1"
  accent_dark = "#4338ca"
  
  # Muted
  muted = "#71717a"
  muted_light = "#a1a1aa"
  
  # Background
  bg = "#ffffff"
  bg_secondary = "#fafafa"
  
  # Cards/Surfaces
  card = "#ffffff"
  card_hover = "#f4f4f5"
  
  # Text
  text = "#18181b"
  text_secondary = "#52525b"
  
  # Borders
  border = "#e4e4e7"
  border_light = "#f4f4f5"

# Custom Fonts
[font_menu]
  # Heading font
  heading = "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  
  # Body font
  body = "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  
  # Monospace
  mono = "'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, monospace"

# Font sizes
[font_size]
  base = "17px"
  scale = "1.25"